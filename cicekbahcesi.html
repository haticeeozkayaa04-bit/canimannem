<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canım Ablam İçin ✨</title>
    <style>
        body { margin: 0; background: #010a1a; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: flex-end; font-family: 'Segoe UI', serif; }
        
        /* 1. Yoğun ve Parlayan Yıldızlı Gökyüzü */
        #sky { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle at bottom, #021a3a 0%, #010a1a 100%); }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) infinite ease-in-out; }
        .glow { position: absolute; color: white; animation: twinkle var(--d) infinite; filter: drop-shadow(0 0 5px gold); font-size: 12px; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }

        /* 2. Gür ve Yapraklı Çiçek Bahçesi */
        #garden { position: relative; width: 100%; max-width: 1000px; height: 65vh; display: flex; justify-content: center; align-items: flex-end; z-index: 5; gap: 3px; padding-bottom: 20px; }

        .flower-stem {
            position: relative;
            width: 5px;
            background: linear-gradient(to top, #132d13, #2d5a27, #4e9445);
            border-radius: 10px;
            transform-origin: bottom;
            animation: growStem 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            display: flex;
            justify-content: center;
        }
        @keyframes growStem { from { transform: scaleY(0); } to { transform: scaleY(1); height: var(--h); } }

        /* Estetik Yapraklar */
        .leaf {
            position: absolute;
            width: 18px;
            height: 12px;
            background: #2d5a27;
            border-radius: 20px 0 20px 0;
            opacity: 0;
            animation: fadeIn 1s var(--ldelay) forwards;
        }
        .leaf.left { left: -14px; transform: rotate(-35deg); }
        .leaf.right { right: -14px; transform: rotate(35deg); border-radius: 0 20px 0 20px; }

        .flower-head {
            position: absolute;
            top: -30px;
            font-size: 40px;
            transform: scale(0);
            animation: bloom 1.5s var(--delay) cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
        }
        @keyframes bloom { 0% { transform: scale(0) rotate(-45deg); opacity: 0; } 100% { transform: scale(1.2) rotate(0deg); opacity: 1; } }

        /* 3. Merkezi Abla Mesajı */
        .message {
            position: absolute;
            top: 18%;
            color: #fff;
            text-align: center;
            width: 100%;
            font-size: 28px;
            letter-spacing: 3px;
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
            opacity: 0;
            animation: fadeIn 3s 5s forwards;
            z-index: 10;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="sky"></div>
    <div class="message">Dünyanın En Özel Çiçekleri, Ablama... ✨🌸🌿</div>
    <div id="garden"></div>

    <script>
        // Yoğun Yıldız ve Parıltı Sistemi
        const sky = document.getElementById('sky');
        for (let i = 0; i < 200; i++) {
            const isGlow = i % 15 === 0;
            const star = document.createElement('div');
            star.className = isGlow ? 'glow' : 'star';
            if (isGlow) star.innerText = "✨";
            
            const size = (Math.random() * 3 + 1) + 'px';
            star.style.width = isGlow ? 'auto' : size;
            star.style.height = isGlow ? 'auto' : size;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 80 + 'vh';
            star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
            sky.appendChild(star);
        }

        // Çok Daha Gür Çiçek Bahçesi (30 Çiçek!)
        const garden = document.getElementById('garden');
        const flowers = ["🌸", "🌹", "🌷", "🌺", "🌻", "🌼", "🌸", "🌹", "🌷", "🌺", "🌻", "🌼", "🌸", "🌹", "🌷", "🌺", "🌻", "🌼", "🌸", "🌹", "🌷", "🌺", "🌻", "🌼", "🌸", "🌹", "🌷", "🌺", "🌻", "🌼"];
        
        flowers.forEach((f, i) => {
            const stem = document.createElement('div');
            stem.className = 'flower-stem';
            const h = (Math.floor(Math.random() * 150) + 150) + "px";
            stem.style.setProperty('--h', h);
            const delay = (i * 0.2) + 's';
            stem.style.animationDelay = delay;

            // Yapraklar
            for (let j = 0; j < 2; j++) {
                const leaf = document.createElement('div');
                leaf.className = j === 0 ? 'leaf left' : 'leaf right';
                leaf.style.top = (40 + j * 20) + "%";
                leaf.style.setProperty('--ldelay', (parseFloat(delay) + 1 + j * 0.5) + 's');
                stem.appendChild(leaf);
            }

            const head = document.createElement('div');
            head.className = 'flower-head';
            head.innerText = f;
            head.style.setProperty('--delay', (parseFloat(delay) + 2.8) + 's');

            stem.appendChild(head);
            garden.appendChild(stem);
        });
    </script>
</body>
</html>
