<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Annen İçin Çiçek Bahçesi</title>
    <style>
        body { margin: 0; background: #010101; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', serif; }
        
        /* 1. Kalp: Çiçeklerin Ortasında Asılı */
        #heart-container { position: relative; width: 350px; height: 350px; z-index: 20; mix-blend-mode: screen; filter: drop-shadow(0 0 15px #ff4d6d); }
        .love-text { position: absolute; color: #ff4d6d; font-size: 13px; font-weight: bold; white-space: nowrap; text-shadow: 0 0 5px #ff4d6d; pointer-events: none; }

        /* 2. Devasa Büyüyen Emoji Çiçekleri (Kayıpsız ve Kesin Çözüm) */
        #garden { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .growing-flower-emoji {
            position: absolute;
            transform-origin: bottom center;
            opacity: 0;
            filter: drop-shadow(0 5px 15px rgba(255,255,255,0.3));
            animation: flowerGrowEmoji 7s ease-out forwards;
        }

        /* Çiçeklerin Devasa Büyüme Animasyonu */
        @keyframes flowerGrowEmoji {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            40% { transform: scale(3) rotate(10deg); opacity: 1; } /* 3 kat devasa büyüme */
            100% { transform: scale(2.5) rotate(0deg) translateY(-90vh); opacity: 0; } /* Yükselirken küçülerek kaybolma */
        }

        /* Mesaj */
        .message { position: absolute; bottom: 8%; color: #fff; text-align: center; width: 100%; text-shadow: 0 0 15px #ff4d6d; z-index: 30; font-size: 30px; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div id="garden"></div>
    <div id="heart-container"></div>
    <div class="message">Anneler Günün Kutlu Olsun Canım Annem! ✨🌸</div>

    <script>
        const container = document.getElementById('heart-container');
        const garden = document.getElementById('garden');
        const words = "I LOVE YOU ";

        // 1. Dönen Yazılı Kalp (Asılı Kalmaya Devam)
        for (let i = 0; i < 150; i++) {
            const span = document.createElement('span');
            span.className = 'love-text';
            span.innerText = words;
            container.appendChild(span);
            const t = (i / 150) * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            span.style.left = `${175 + x * 12}px`;
            span.style.top = `${175 + y * 12}px`;
            span.animate([
                { transform: `rotate(${t}rad) translateX(0px) scale(1)` },
                { transform: `rotate(${t + 2 * Math.PI}rad) translateX(25px) scale(1.3)` }
            ], { duration: 4000, iterations: Infinity, delay: i * 25 });
        }

        // 2. BOL BOL, DEVASA BÜYÜYEN EMOJİ ÇİÇEKLERİ
        const flowers = ["🌸", "🌹", "🌷", "🌺", "🌻", "🌼", "💐", "🦋"];

        function plantFlowerEmoji() {
            const flower = document.createElement('div');
            flower.className = 'growing-flower-emoji';
            flower.innerText = flowers[Math.floor(Math.random() * flowers.length)];
            // Ekranın altından rastgele bir yatay konum
            flower.style.left = (Math.random() * 110 - 5) + "vw";
            // Başlangıç boyutu (animasyonla 3 katına çıkacak)
            const baseSize = (Math.random() * 20 + 30) + "px"; // 30px - 50px arası
            flower.style.fontSize = baseSize;
            flower.style.animationDuration = (Math.random() * 3 + 5) + "s"; // 5s - 8s arası
            
            garden.appendChild(flower);
            // Animasyon bittikten sonra çiçeği sil
            setTimeout(() => flower.remove(), 8000);
        }

        // Çok Daha Fazla Çiçek: Her 200 milisaniyede bir çiçek fırlat
        setInterval(plantFlowerEmoji, 200);
    </script>
</body>
</html>
