<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canım Annem</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { position: absolute; top: 0; left: 0; z-index: 5; }
        
        #heart-container { position: relative; width: 220px; height: 220px; z-index: 10; pointer-events: none; }
        .love-text { position: absolute; color: #ff4d6d; font-size: 9px; white-space: nowrap; text-shadow: 0 0 5px #ff4d6d; }
        
        .message { position: absolute; bottom: 8%; color: white; text-align: center; width: 100%; font-size: 1.2rem; text-shadow: 0 0 10px #ff4d6d; z-index: 15; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="heart-container"></div>
    <div class="message">Canım Annem, Anneler Günün Kutlu Olsun! 🌸✨</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 1. Dallanıp Büyüyen Çiçekler Fonksiyonu
        function drawBranch(x, y, len, angle, branchWidth) {
            ctx.beginPath();
            ctx.save();
            ctx.strokeStyle = "#2d5a27"; // Dal rengi (Koyu Yeşil)
            ctx.lineWidth = branchWidth;
            ctx.translate(x, y);
            ctx.rotate(angle * Math.PI / 180);
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -len);
            ctx.stroke();

            if (len < 10) {
                // Dalın ucuna gerçek çiçek (Emoji olsa bile dalın ucunda!)
                ctx.font = "20px Arial";
                const flowers = ["🌸", "🌺", "🌷", "🌹"];
                ctx.fillText(flowers[Math.floor(Math.random() * flowers.length)], -10, -len);
                ctx.restore();
                return;
            }

            // Dallanma mantığı
            drawBranch(0, -len, len * 0.75, angle + 15, branchWidth * 0.7);
            drawBranch(0, -len, len * 0.75, angle - 15, branchWidth * 0.7);

            ctx.restore();
        }

        // Her 2 saniyede bir yeni bir "dallı çiçek" fışkırsın
        setInterval(() => {
            const startX = Math.random() * canvas.width;
            drawBranch(startX, canvas.height, 40 + Math.random() * 40, 0, 5);
        }, 2000);

        // 2. Dönen Kalp
        const container = document.getElementById('heart-container');
        for (let i = 0; i < 90; i++) {
            const span = document.createElement('span');
            span.className = 'love-text';
            span.innerText = "I LOVE YOU ";
            container.appendChild(span);
            const t = (i / 90) * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            span.style.left = `${110 + x * 7}px`;
            span.style.top = `${110 + y * 7}px`;
            span.animate([
                { transform: `rotate(${t}rad) translateX(0px)` },
                { transform: `rotate(${t + 2 * Math.PI}rad) translateX(15px)` }
            ], { duration: 4500, iterations: Infinity, delay: i * 35 });
        }
    </script>
</body>
</html>
