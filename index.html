<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Canım Annem</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #heart-container { position: relative; width: 300px; height: 300px; }
        .love-text { position: absolute; color: #ff4d6d; font-size: 11px; white-space: nowrap; text-shadow: 0 0 5px #ff4d6d; }
        .flower { position: absolute; font-size: 25px; animation: float 6s linear infinite; opacity: 0; }
        .message { position: absolute; bottom: 8%; color: white; text-align: center; width: 100%; text-shadow: 0 0 10px #ff4d6d; z-index: 10; font-size: 22px; }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="heart-container"></div>
    <div id="flower-field"></div>
    <div class="message">Dünyanın En Güzel Annesine... 🌸💖</div>

    <script>
        const container = document.getElementById('heart-container');
        const flowerField = document.getElementById('flower-field');
        const words = "I LOVE YOU ";
        const flowers = ["🌸", "🌹", "🌷", "🌺", "🌻", "🌼"];

        // Dönen Yazılı Kalp
        for (let i = 0; i < 100; i++) {
            const span = document.createElement('span');
            span.className = 'love-text';
            span.innerText = words;
            container.appendChild(span);
            const t = (i / 100) * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            span.style.left = `${150 + x * 10}px`;
            span.style.top = `${150 + y * 10}px`;
            span.animate([
                { transform: `rotate(${t}rad) translateX(0px)` },
                { transform: `rotate(${t + 2 * Math.PI}rad) translateX(15px)` }
            ], { duration: 3000, iterations: Infinity, delay: i * 30 });
        }

        // Uçuşan Çiçekler
        function createFlower() {
            const f = document.createElement('div');
            f.className = 'flower';
            f.innerText = flowers[Math.floor(Math.random() * flowers.length)];
            f.style.left = Math.random() * 100 + "vw";
            f.style.animationDuration = (Math.random() * 3 + 4) + "s";
            flowerField.appendChild(f);
            setTimeout(() => f.remove(), 6000);
        }
        setInterval(createFlower, 300);
    </script>
</body>
</html>
