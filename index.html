<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canım Annem</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: black; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        
        /* Videoyu tam ekran ve mobil uyumlu yapar */
        .video-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Mesajı videonun üzerine şık bir şekilde yerleştirir */
        .message-box {
            position: absolute;
            bottom: 10%;
            z-index: 2;
            width: 90%;
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        .message {
            color: white;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.3rem;
            font-weight: bold;
            text-shadow: 0 0 10px #ff4d6d;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video id="myVideo" autoplay loop muted playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-beautiful-pink-flowers-blooming-in-time-lapse-41031-large.mp4" type="video/mp4">
            Tarayıcınız video etiketini desteklemiyor.
        </video>
    </div>

    <div class="message-box">
        <p class="message">Anneler Günün Kutlu Olsun Canım Annem! 🌸💖</p>
    </div>

    <script>
        // Bazı telefonlarda otomatik oynatma için ek dokunuş
        document.addEventListener('touchstart', function() {
            document.getElementById('myVideo').play();
        }, {once: true});
    </script>
</body>
</html>
