<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canım Annem</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
        
        /* Kalp */
        #heart-container { position: relative; width: 200px; height: 200px; z-index: 10; }
        .love-text { position: absolute; color: #ff4d6d; font-size: 10px; white-space: nowrap; text-shadow: 0 0 5px #ff4d6d; }

        /* Dallı Çiçekler (Sadece 4 tane, sabit) */
        .branch-flower { position: absolute; bottom: 0; text-align: center; z-index: 5; animation: growUp 4s ease-out forwards; }
        .branch-line { width: 4px; background: #2d5a27; margin: 0 auto; border-radius: 5px; }
        @keyframes growUp { 0% { height: 0; opacity: 0; } 100% { height: 150px; opacity: 1; } }

        /* Uçuşan Çiçekler */
        .float-flower { position: absolute; bottom: -50px; animation: floatUp 6s linear forwards; z-index: 8; }
        @keyframes floatUp { 
            0% { transform: translateY(0) scale(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-110vh) scale(1.5) rotate(360deg); opacity: 0; } 
        }

        .message { position: absolute; bottom: 8%; color: white; width: 100%; text-align: center; text-shadow: 0 0 10px #ff4d6d; font-weight: bold; z-index: 15; }
    </style>
</head>
<body>
    <div id="heart-container"></div>
    <div id="garden"></div>
    <div class="message">Anneler Günün Kutlu Olsun Canım Annem! 💖🌸</div>

    <script>
        // 1. Kalp
        const container = document.getElementById('heart-container');
        for (let i = 0; i < 80; i++) {
            const span = document.createElement('span');
            span.className = 'love-text';
            span.innerText = "I LOVE YOU ";
            container.appendChild(span);
            const t = (i / 80) * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            span.style.left = `${100 + x * 6}px`;
            span.style.top = `${100 + y * 6}px`;
            span.animate([{transform:`rotate(${t}rad)`},{transform:`rotate(${t+6.28}rad)`}], {duration:4000, iterations:Infinity});
        }

        // 2. Dallı Çiçekler (Dallarıyla beraber 4 adet)
        const flowers = ["🌸", "🌺", "🌷", "🌹"];
        for(let i=1; i<=4; i++) {
            const bf = document.createElement('div');
            bf.className = 'branch-flower';
            bf.style.left = (i * 20) + "vw";
            bf.innerHTML = `<div style="font-size:30px">${flowers[i-1]}</div><div class="branch-line" style="height:120px"></div>`;
            document.body.appendChild(bf);
        }

        // 3. Uçuşan Çiçekler
        setInterval(() => {
            const f = document.createElement('div');
            f.className = 'float-flower';
            f.innerText = flowers[Math.floor(Math.random()*4)];
            f.style.left = Math.random()*100 + "vw";
            f.style.fontSize = (Math.random()*15 + 20) + "px";
            document.getElementById('garden').appendChild(f);
            setTimeout(() => f.remove(), 6000);
        }, 500);
    </script>
</body>
</html>
