<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canım Annem</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; -webkit-font-smoothing: antialiased; }
        
        /* Kalp boyutu mobile göre optimize edildi */
        #heart-container { position: relative; width: 220px; height: 220px; z-index: 10; pointer-events: none; }
        .love-text { position: absolute; color: #ff4d6d; font-size: 9px; white-space: nowrap; text-shadow: 0 0 5px #ff4d6d; }

        /* Mobil Uyumlu Çiçekler */
        .flower {
            position: absolute;
            top: 100vh; /* Ekranın hemen altından başlar - Kesin Çözüm */
            transform-origin: center;
            animation: growAndFloatMobile 7s linear forwards;
            z-index: 5;
            user-select: none;
            -webkit-user-select: none;
        }

        @keyframes growAndFloatMobile {
            0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; transform: translate(0, -10vh) scale(1.3) rotate(45deg); }
            100% { transform: translate(0, -120vh) scale(1.8) rotate(360deg); opacity: 0; }
        }

        .message {
            position: absolute;
            bottom: 10%;
            color: white;
            text-align: center;
            width: 90%;
            font-size: 1.1rem;
            text-shadow: 0 0 10px #ff4d6d;
            z-index: 15;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="heart-container"></div>
    <div id="garden"></div>
    <div class="message">Anneler Günün Kutlu Olsun Canım Annem! 💖🌸</div>

    <script>
        const container = document.getElementById('heart-container');
        const garden = document.getElementById('garden');
        const flowers = ["🌸", "🌹", "🌷", "🌺", "🌻", "🌼"];

        // Kalp oluşturma - Mobil Boyut
        for (let i = 0; i < 90; i++) {
            const span = document.createElement('span');
            span.className = 'love-text';
            span.innerText = "I LOVE YOU ";
            container.appendChild(span);
            const t = (i / 90) * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            span.style.left = `${110 + x * 7}px`; // Kalp küçültüldü
            span.style.top = `${110 + y * 7}px`;
            span.animate([
                { transform: `rotate(${t}rad) translateX(0px)` },
                { transform: `rotate(${t + 2 * Math.PI}rad) translateX(12px)` }
            ], { duration: 4000, iterations: Infinity, delay: i * 35 });
        }

        // Çiçek oluşturma fonksiyonu
        function createFlower() {
            const f = document.createElement('div');
            f.className = 'flower';
            f.innerText = flowers[Math.floor(Math.random() * flowers.length)];
            f.style.left = Math.random() * 95 + "vw"; // Kenarlara çok sıkışmasın
            f.style.fontSize = (Math.random() * 15 + 20) + "px"; // 20px - 35px arası
            f.style.animationDuration = (Math.random() * 3 + 5) + "s";
            garden.appendChild(f);
            // Telefon belleği için temizlik
            setTimeout(() => f.remove(), 7000);
        }

        // Her 400ms'de bir çiçek (Mobil performansı için ideal)
        setInterval(createFlower, 400);
    </script>
</body>
</html>
