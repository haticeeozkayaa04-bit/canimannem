<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Annen İçin Çiçek Bahçesi</title>
    <style>
        body { margin: 0; background: #010101; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', serif; }
        
        /* 1. Kalp: Çiçeklerin Ortasında Asılı */
        #heart-container { position: relative; width: 350px; height: 350px; z-index: 20; mix-blend-mode: screen; filter: drop-shadow(0 0 15px #ff4d6d); }
        .love-text { position: absolute; color: #ff4d6d; font-size: 13px; font-weight: bold; white-space: nowrap; text-shadow: 0 0 5px #ff4d6d; pointer-events: none; }

        /* 2. Gerçek Büyüyen Çiçekler */
        #garden { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .growing-flower-img {
            position: absolute;
            transform-origin: bottom center;
            opacity: 0;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
            animation: flowerGrow 8s ease-out forwards;
        }

        /* Çiçeklerin Farklı Boyut ve Konumları (Büyüme Animasyonu) */
        @keyframes flowerGrow {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            15% { opacity: 1; }
            50% { transform: scale(1.2) rotate(15deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg) translateY(-85vh); opacity: 0; }
        }

        /* 3. Yıldızlar/Parıltılar */
        .sparkle { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite alternate; z-index: 5; }
        @keyframes twinkle { from { opacity: 0.1; } to { opacity: 1; } }

        /* Mesaj */
        .message { position: absolute; bottom: 8%; color: #fff; text-align: center; width: 100%; text-shadow: 0 0 15px #ff4d6d; z-index: 30; font-size: 30px; font-weight: bold; letter-spacing: 2px; animation: textGlow 2s infinite alternate; }
        @keyframes textGlow { from { text-shadow: 0 0 10px #ff4d6d; } to { text-shadow: 0 0 25px #ff4d6d, 0 0 10px #fff; } }
    </style>
</head>
<body>
    <div id="garden"></div>
    <div id="heart-container"></div>
    <div class="message">Anneler Günün Kutlu Olsun Canım Annem! ✨🌸</div>

    <script>
        const container = document.getElementById('heart-container');
        const garden = document.getElementById('garden');
        const words = "I LOVE YOU ";

        // 1. Dönen Yazılı Kalp (Hafifçe Büyüyen ve Asılı)
        for (let i = 0; i < 150; i++) {
            const span = document.createElement('span');
            span.className = 'love-text';
            span.innerText = words;
            container.appendChild(span);
            const t = (i / 150) * 2 * Math.PI;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            span.style.left = `${175 + x * 12}px`;
            span.style.top = `${175 + y * 12}px`;
            span.animate([
                { transform: `rotate(${t}rad) translateX(0px) scale(1)` },
                { transform: `rotate(${t + 2 * Math.PI}rad) translateX(25px) scale(1.3)` }
            ], { duration: 4000, iterations: Infinity, delay: i * 25 });
        }

        // 2. GERÇEK, BÜYÜYEN ÇİÇEKLER (VİDEODAKİ GİBİ)
        // Çiçek resimlerinin URL'leri (Gül, Papatya, Orkide vb.)
        const flowerImages = [
            "https://i.imgur.com/8Q8j9Gj.png", // Pembe Gül 1
            "https://i.imgur.com/w1O2nS9.png", // Beyaz Papatya 1
            "https://i.imgur.com/M6L2M5t.png", // Pembe Gül 2
            "https://i.imgur.com/GzL68vT.png", // Mor Orkide
            "https://i.imgur.com/Fw5jA6F.png", // Sarı Papatya
            "https://i.imgur.com/6J7r2V7.png"  // Kırmızı Gül
        ];

        function plantFlower() {
            const flower = document.createElement('img');
            flower.className = 'growing-flower-img';
            // Rastgele bir çiçek resmi seç
            flower.src = flowerImages[Math.floor(Math.random() * flowerImages.length)];
            // Ekranın altından rastgele bir yatay konum
            flower.style.left = (Math.random() * 110 - 5) + "vw";
            // Rastgele büyüme hızı ve boyutu
            const size = (Math.random() * 100 + 100) + "px"; // 100px - 200px arası
            flower.style.width = size;
            flower.style.height = "auto";
            flower.style.animationDuration = (Math.random() * 4 + 6) + "s"; // 6s - 10s arası
            
            garden.appendChild(flower);
            // Animasyon bittikten sonra çiçeği sil
            setTimeout(() => flower.remove(), 10000);
        }

        // Çok Daha Fazla Çiçek: Her 250 milisaniyede bir çiçek fırlat
        setInterval(plantFlower, 250);

        // 3. Arka Plan Parıltıları
        for (let i = 0; i < 70; i++) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.width = sparkle.style.height = (Math.random() * 4 + 1) + "px";
            sparkle.style.left = Math.random() * 100 + "vw";
            sparkle.style.top = Math.random() * 100 + "vh";
            sparkle.style.animationDelay = Math.random() * 3 + "s";
            document.body.appendChild(sparkle);
        }
    </script>
</body>
</html>
